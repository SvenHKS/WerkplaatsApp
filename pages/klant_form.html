{% extends "base.html" %}
{% block title %}{% if klant %}Klant bewerken{% else %}Nieuwe klant{% endif %} | GarageApp{% endblock %}
{% block content %}
<!-- Titel afhankelijk van nieuw/bewerken -->
<section class="page-header">
    <p class="eyebrow">Beveiligd</p>
    <h1>{% if klant %}Klant bewerken{% else %}Nieuwe klant{% endif %}</h1>
</section>

<!-- Formulier voor klantgegevens -->
<form class="card form-card" method="post">
    <label for="first_name">Voornaam</label>
    <input id="first_name" name="first_name" value="{{ klant.first_name if klant else '' }}" required>

    <label for="last_name">Achternaam</label>
    <input id="last_name" name="last_name" value="{{ klant.last_name if klant else '' }}" required>

    <label for="email">E-mail</label>
    <input id="email" name="email" type="email" value="{{ klant.email if klant else '' }}" required>

    <label for="phone">Telefoon</label>
    <input id="phone" name="phone" value="{{ klant.phone if klant else '' }}" required>

    <label for="notes">Notities</label>
    <textarea id="notes" name="notes" rows="4">{{ klant.notes if klant else '' }}</textarea>

    <button class="button" type="submit">Opslaan</button>
</form>
{% endblock %}
