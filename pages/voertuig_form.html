{% extends "base.html" %}
{% block title %}{% if voertuig %}Voertuig bewerken{% else %}Nieuw voertuig{% endif %} | GarageApp{% endblock %}
{% block content %}
<!-- Titel -->
<section class="page-header">
    <p class="eyebrow">Beveiligd</p>
    <h1>{% if voertuig %}Voertuig bewerken{% else %}Nieuw voertuig{% endif %}</h1>
</section>

<!-- Formulier -->
<form class="card form-card" method="post">
    <label for="customer_id">Klant</label>
    <select id="customer_id" name="customer_id" required>
        {% for klant in klanten %}
            <option value="{{ klant.id }}" {% if voertuig and voertuig.customer_id == klant.id %}selected{% endif %}>
                {{ klant.full_name }}
            </option>
        {% endfor %}
    </select>

    <label for="brand">Merk</label>
    <input id="brand" name="brand" value="{{ voertuig.brand if voertuig else '' }}" required>

    <label for="model">Model</label>
    <input id="model" name="model" value="{{ voertuig.model if voertuig else '' }}" required>

    <label for="year">Bouwjaar</label>
    <input id="year" name="year" type="number" min="1950" max="2100" value="{{ voertuig.year if voertuig else '' }}" required>

    <label for="license_plate">Kenteken</label>
    <input id="license_plate" name="license_plate" value="{{ voertuig.license_plate if voertuig else '' }}" required>

    <label for="vin">VIN</label>
    <input id="vin" name="vin" value="{{ voertuig.vin if voertuig else '' }}">

    <button class="button" type="submit">Opslaan</button>
</form>
{% endblock %}
