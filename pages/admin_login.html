{% extends "base.html" %}
{% block title %}Admin login | GarageApp{% endblock %}
{% block content %}
<!-- Inloglayout voor admins -->
<section class="auth-layout">
    <!-- Inlogformulier -->
    <form class="card form-card" method="post">
        <p class="eyebrow">Admin</p>
        <h1>Inloggen</h1>
        <label for="username">Gebruikersnaam</label>
        <input id="username" name="username" type="text" required>

        <label for="password">Wachtwoord</label>
        <input id="password" name="password" type="password" required>

        <button class="button" type="submit">Login</button>
    </form>

    <!-- Uitleg en standaard admin-account -->
    <aside class="card">
        <h2>Admin-toegang</h2>
        <p>Gebruik uw <strong>gebruikersnaam</strong> en <strong>wachtwoord</strong>.</p>
        <br>
        <h3>Standaard admin</h3>
        <p><strong>Gebruikersnaam:</strong> admin</p>
        <p><strong>Wachtwoord:</strong> welkomadmin</p>
    </aside>
</section>
{% endblock %}
